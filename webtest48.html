<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <script async src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>

    <style>
        /* 지도가 보일 영역의 크기를 명확히 지정합니다 */
        #map {
            width: 500px;
            height: 500px;
            background-color: #f0f0f0;
            /* 로딩 전 영역 확인용 */
        }
    </style>
</head>

<body>
    <button onclick="MyPos()" type="button">현재 나의 위치</button>
    <div id="result"></div>
    <div id="map"></div>

    <script type="text/javascript">
        // MarkerImage 대신 최신 방식인 Icon 객체 등을 사용하기 위해 전역 변수 설정
        var markerIcon = "marker.jpg";

        // API가 로드되었을 때 실행될 빈 함수 (필요시)
        function initMap() {
            console.log("Maps API Loaded");
        }

        function MyPos() {
            if (navigator.geolocation) {
                // 위치 정보를 가져올 때 옵션 추가 (정확도 향상)
                navigator.geolocation.getCurrentPosition(CurPosition, ErrorCallback, {
                    enableHighAccuracy: true,
                    timeout: 5000
                });
            } else {
                alert("이 브라우저에서는 위치 서비스를 지원하지 않습니다.");
            }
        }

        function CurPosition(position) {
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;

            document.getElementById("result").innerHTML = "위도: " + lat + " / 경도: " + lng;

            var latlng = new google.maps.LatLng(lat, lng);

            var options = {
                zoom: 15,
                center: latlng,
                mapTypeId: google.maps.MapTypeId.ROADMAP
            };

            // 지도 생성
            var map = new google.maps.Map(document.getElementById("map"), options);

            // 마커 생성
            var marker = new google.maps.Marker({
                map: map,
                position: latlng,
                title: "현재 위치",
                icon: markerIcon // marker.jpg 파일이 경로에 있어야 나타납니다.
            });
        }

        function ErrorCallback(error) {
            var msg = "";
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    msg = "현재 위치 정보에 대한 권한이 없습니다.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    msg = "현재 위치 정보를 구할 수 없습니다.";
                    break;
                case error.TIMEOUT:
                    msg = "시간 제한을 초과했습니다.";
                    break;
                default:
                    msg = "알 수 없는 오류가 발생했습니다.";
                    break;
            }
            document.getElementById("result").innerHTML = msg;
        }
    </script>
</body>

</html>
